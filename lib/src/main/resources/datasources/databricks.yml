datasource:
  keys:
    - type
    - host
  values:
    type: databricks
datasets:
  - name: Table
    identification:
      keys:
        - catalog
        - schema
        - table
    fields:
      # on parquet/csv files, there can be a column name AND a position (for deduplication)
      - field_key*
dataProcesses:
  - name: Job
    identification:
      keys:
        - job_id
